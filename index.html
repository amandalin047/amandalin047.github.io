<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Amanda Lin 🐶</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: 
          linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
          url('https://cdn.wallpapersafari.com/51/31/2M1TiU.jpg') no-repeat center center fixed;
        background-size: cover;
        color: #f5f5f5;
        line-height: 1.6;
        padding: 2rem;
        max-width: 700px;
        margin: auto;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(255, 77, 166, 0.1);
    }


    h1 {
      font-size: 2rem;
      margin-bottom: 0.8rem;
      color: #f5f5f5;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    h1 em {
      font-style: italic;
      color: #ff4da6; /* hot pink highlight */
    }

    p {
      margin-bottom: 1rem;
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin-bottom: 1.5rem;
    }

    nav li {
      margin-bottom: 0.5rem;
      padding-left: 1rem;
      position: relative;
    }

    nav li::before {
      content: "✦";
      color: #ff4da6;
      position: absolute;
      left: 0;
    }

    nav a {
      text-decoration: none;
      color: #ff4da6;
      font-weight: 600;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #ff80bf;
    }

    a {
      color: #ff4da6;
      text-decoration: underline;
    }

    a:hover {
      color: #ff80bf;
    }

    /* Optional: Add a soft border or glow to main content */
    body {
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(255, 77, 166, 0.1);
    }
  </style>
</head>
<body>
  <h1>Szu-Chi Lin, but call me Amanda — otherwise, it sounds like <em>sushi</em>.</h1>
  <p>🧠 Grad student @ NTU; EEG + ML researcher</p>

    <ul>
      <li><a href="cv.html">Curriculum Vitae</a></li>
      <li><a href="about-me.html">Autobiography</a></li>
    </ul>
  </nav>

  <p>⬇️ You can also <a href="about-me-v2.pdf">download my CV (PDF)</a>.</p>
</body>
</html>
