<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Amanda Lin 🐶</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
        url('https://cdn.wallpapersafari.com/51/31/2M1TiU.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #f5f5f5;
      line-height: 1.6;
      padding: 4rem 10%;
      min-height: 100vh;
    }

    main {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.8rem;
      color: #fff;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    h1 em {
      font-style: italic;
      color: #ff4da6;
    }

    p {
      margin-bottom: 1rem;
    }

    nav {
      margin-left: 1.6em; /* this indents the whole nav block */
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }

    nav li {
      margin-bottom: 0.5rem;
      padding-left: 1.3rem;
      position: relative;
    }

    nav li::before {
      content: "✦";
      color: #ff4da6;
      position: absolute;
      left: 0;
    }

    nav a {
      text-decoration: none;
      color: #ff4da6;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #ff80bf;
    }

    a {
      color: #ff4da6;
      text-decoration: underline;
    }

    a:hover {
      color: #ff80bf;
    }
  </style>
</head>
<body>
  <main>
    <h1>Szu-Chi Lin, but call me Amanda — otherwise, it sounds like <em>sushi</em>.</h1>
    <p>🧠 Grad student @ NTU · EEG + ML researcher</p>

    <nav>
      <ul>
        <li><a href="cv.html">Curriculum Vitae</a></li>
        <li><a href="about-me.html">Autobiography</a></li>
      </ul>
    </nav>

    <p>⬇️ You can also <a href="about-me-v2.pdf">download my CV (PDF)</a>.</p>
  </main>
</body>
</html>
